<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Escape Office | Krise gelöst</title>
  <meta name="description" content="Victory-Screen für den gelösten Escape Office Lockdown.">
  <link rel="stylesheet" href="../styles.css">
</head>
<body class="victory-page">
  <div class="noise" aria-hidden="true"></div>
  <div class="scanline" aria-hidden="true"></div>

  <main class="victory-shell reveal-in" aria-labelledby="victory-title">
    <section class="victory-card safe-card" data-safe-puzzle>
      <img class="victory-logo" src="../aareon_logo_white.png" alt="Aareon Logo">
      <p class="eyebrow">Krise gelöst · Lockdown aufgehoben · <span data-team-name>Team</span></p>

      <div class="safe-vault" aria-hidden="true">
        <div class="safe-door">
          <span class="safe-dial"></span>
          <span class="safe-handle"></span>
        </div>
      </div>

      <h1 id="victory-title" class="safe-question" data-safe-question>Wo steht der Tresor?</h1>

      <p class="eyebrow safe-code-label">Der Code lautet:</p>
      <div class="safe-code resolution-grid" data-safe-code aria-label="Tresor-Code"></div>
    </section>
  </main>

  <script src="../script.js" defer></script>
</body>
</html>
