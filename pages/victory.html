<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Escape Office | Krise gelöst</title>
  <meta name="description" content="Victory-Screen für den gelösten Escape Office Lockdown.">
  <link rel="stylesheet" href="../styles.css">
</head>
<body class="victory-page">
  <div class="noise" aria-hidden="true"></div>
  <div class="scanline" aria-hidden="true"></div>

  <main class="victory-shell reveal-in" aria-labelledby="victory-title">
    <section class="victory-card">
      <img class="victory-logo" src="../aareon_logo_white.png" alt="Aareon Logo">
      <p class="eyebrow">Crisis resolved</p>
      <h1 id="victory-title">Krise gelöst</h1>
      <p class="lead">Der Lockdown wurde aufgehoben. Das Headquarter ist wieder freigegeben.</p>
      <div class="resolution-grid" aria-label="Systemstatus">
        <span>LOCKDOWN: AUS</span>
        <span>ZUGRIFF: ERLAUBT</span>
        <span>AAREON: GESICHERT</span>
      </div>
    </section>
  </main>

  <script src="../script.js" defer></script>
</body>
</html>
