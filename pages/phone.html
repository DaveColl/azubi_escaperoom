<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Escape Office | Mobile Spur</title>
  <meta name="description" content="Mobile Team-Spur für den Escape Office Lockdown.">
  <link rel="stylesheet" href="../styles.css">
</head>
<body class="phone-page">
  <div class="noise" aria-hidden="true"></div>
  <div class="scanline" aria-hidden="true"></div>

  <main class="phone-shell reveal-in" data-phone-page aria-labelledby="phone-title">
    <section class="phone-device">
      <div class="phone-top" aria-hidden="true"></div>
      <div class="phone-screen">
        <p class="eyebrow danger-text" data-phone-eyebrow>Mobile Freigabe</p>
        <h1 id="phone-title">Hinweis entschlüsselt</h1>
        <p class="lead" data-team-task>Der Team-Hinweis wird geladen...</p>
        <div class="phone-clue">
          <span>Code-Fragment</span>
          <strong data-team-fragment>KRISE</strong>
        </div>
        <form class="password-form final-password-form" data-final-password-form data-team="team1" autocomplete="off">
          <label for="phoneFinalPassword">Finaler Krisencode</label>
          <div class="password-row">
            <input id="phoneFinalPassword" name="finalPassword" type="password" placeholder="Code Team" required>
            <button type="submit">Freigeben</button>
          </div>
          <p class="hint">Temporärer Testcode: krise1</p>
          <p class="feedback" role="status" aria-live="polite"></p>
        </form>
      </div>
    </section>
  </main>

  <script src="../script.js" defer></script>
</body>
</html>
